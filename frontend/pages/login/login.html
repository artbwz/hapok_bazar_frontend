<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hapok Bazar</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="../home/index.html">Hapok Bazar</a>
        <nav class="topbar-nav" aria-label="Navegacao principal">
            <a href="../cadastro/cadastro.html">Cadastro</a>
            <a href="../confirmar_compra/confirmar_compra.html">Carrinho</a>
        </nav>
    </header>

    <main class="page-main">
        <section class="login-panel" aria-labelledby="loginTitulo">
            <h1 id="loginTitulo">Entrar na conta</h1>
            <p>Use seu e-mail e senha para acessar.</p>

            <form id="loginForm" novalidate>
                <div class="input-group">
                    <label for="loginEmail">E-mail</label>
                    <input type="email" id="loginEmail" required>
                </div>

                <div class="input-group">
                    <label for="loginSenha">Senha</label>
                    <input type="password" id="loginSenha" minlength="6" required>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
                <p class="feedback" id="feedbackLogin" aria-live="polite"></p>
            </form>

            <p class="hint">Nao possui conta? <a href="../cadastro/cadastro.html">Cadastre-se aqui</a>.</p>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
