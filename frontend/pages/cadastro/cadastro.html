<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro | Hapok Bazar</title>
    <link rel="stylesheet" href="cadastro.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="../home/home.html">Hapok Bazar</a>
      <nav class="topbar-nav" aria-label="Navegacao principal">
        <a href="../login/login.html">Login</a>
        <a href="../confirmar_compra/confirmar_compra.html">Carrinho</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="form-panel" aria-labelledby="cadastroTitulo">
        <h1 id="cadastroTitulo">Criar conta</h1>
        <p>Preencha seus dados para finalizar o cadastro.</p>

        <form id="cadastroForm" novalidate>
          <div class="input-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" required />
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="input-group">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              placeholder="(21) 99999-9999"
              maxlength="11"
              required
            />
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="senha">Senha</label>
              <input
                type="password"
                id="senha"
                name="senha"
                minlength="6"
                required
              />
            </div>
            <div class="input-group">
              <label for="confirmarSenha">Confirmar senha</label>
              <input
                type="password"
                id="confirmarSenha"
                name="confirmarSenha"
                minlength="6"
                required
              />
            </div>
          </div>

          <label class="checkbox-line">
            <input type="checkbox" id="termos" required />
            <span
              >Li e aceito os
              <a href="../termos/termos.html" target="_blank">termos de uso</a
              >.</span
            >
          </label>

          <button type="submit" class="btn-primary">Cadastrar</button>
          <p class="feedback" id="feedbackCadastro" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="cadastro.js"></script>
  </body>
</html>
